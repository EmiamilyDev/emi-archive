<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archive List | EMI Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='2' y='2' width='60' height='60' rx='14' fill='%23ffffff'/%3E%3Ctext x='32' y='45' text-anchor='middle' font-family='Brush%20Script%20MT,%20cursive' font-size='54' font-weight='700' fill='%23000000'%3EE%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <header class="site-header">
    <div class="shell header-inner">
      <a class="brand" href="index.html">EMI ARCHIVE</a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="site-nav" id="site-nav" aria-label="Main">
        <a href="index.html" data-primary="home">Home</a>
        <a href="archive.html?category=ON%20SCREEN" class="is-active" data-primary="ON SCREEN">On Screen</a>
        <a href="archive.html?category=IN%20STYLE" data-primary="IN STYLE">In Style</a>
        <a href="archive.html?category=ON%20STAGE" data-primary="ON STAGE">On Stage</a>
        <a href="timeline.html" data-primary="timeline">Timeline</a>
        <a href="about.html" data-primary="about">About</a>
        <a href="#search" data-primary="search">Search</a>
      </nav>
    </div>
  </header>

  <main class="shell page-main">
    <!-- Section Hero -->
    <section class="section-hero" id="section-hero">
      <div class="section-hero-content">
        <p class="kicker">Archive Section</p>
        <h1 id="section-title">ON SCREEN</h1>
        <p id="section-description" class="section-description">Stories told through acting—from early career moments to lead roles that defined her on-screen presence.</p>
        <div class="section-stats">
          <span><strong id="collection-count">6</strong> Collections</span>
          <span><strong id="record-count">28</strong> Records</span>
        </div>
      </div>
    </section>

    <!-- Collections in Section -->
    <section class="section-collections" id="section-collections" aria-label="Collections in this section">
      <h2>Collections in <span id="section-name">ON SCREEN</span></h2>
      <div class="collections-browser-grid" id="collections-grid"></div>
    </section>

    <!-- All Records Section -->
    <section class="all-records-section">
      <div class="section-head">
        <h2>All Records</h2>
        <a href="#search">Filter & Search</a>
      </div>

      <section id="search" class="filters-panel" aria-label="Archive filters">
        <div class="filters">
          <input id="searchInput" type="search" placeholder="Search records..." aria-label="Search records" />
          <select id="categoryFilter" aria-label="Filter by category">
            <option value="">Category</option>
          </select>
          <select id="subcategoryFilter" aria-label="Filter by subcategory">
            <option value="">Subcategory</option>
          </select>
          <select id="yearFilter" aria-label="Filter by year">
            <option value="">Year</option>
          </select>
          <select id="brandFilter" aria-label="Filter by brand">
            <option value="">Brand</option>
          </select>
          <select id="eventFilter" aria-label="Filter by event type">
            <option value="">Event Type</option>
          </select>
          <select id="locationFilter" aria-label="Filter by location">
            <option value="">Location</option>
          </select>
          <button id="toggleView" type="button">Switch to List</button>
        </div>
        <p id="recordsCount" class="filters-meta"></p>
      </section>

      <section id="archiveRecords" class="record-grid" aria-label="Archive records"></section>
    </section>
  </main>

  <footer class="site-footer">
    <div class="shell">
      <p>© <span id="year"></span> EMI Archive</p>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
